version: '3.9'

# Production override — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vitaplate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Don't expose port in production
    ports: []

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # Don't expose port in production
    ports: []

  backend:
    build:
      target: production
    restart: always
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/vitaplate
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    # Remove volume mounts in production (baked into image)
    volumes: []

  frontend:
    build:
      target: production
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file: ./frontend/.env.production
    volumes: []
    depends_on:
      - backend

  # Remove prisma-studio in production
  prisma-studio:
    profiles:
      - disabled
